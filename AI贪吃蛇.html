<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI Snake - Smart Adaptive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',sans-serif;color:#eee}
.container{text-align:center}
h1{margin-bottom:10px;font-weight:300;color:#e94560;font-size:20px}
canvas{background:#16213e;border:2px solid #0f3460;border-radius:8px;display:block;margin:0 auto}
.controls{margin-top:12px;display:flex;justify-content:center;gap:6px;align-items:center;flex-wrap:wrap}
.controls button{background:#0f3460;color:#eee;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .2s}
.controls button:hover{background:#1a4a8a}
.controls button.active{background:#e94560}
.info{margin-top:8px;display:flex;justify-content:center;gap:20px;font-size:13px;color:#aaa}
.info span{color:#eee;font-weight:600}
.status{margin-top:4px;font-size:12px;min-height:16px;color:#888}
</style>
</head>
<body>
<div class="container">
  <h1>AI Snake (Smart Adaptive)</h1>
  <canvas id="gc"></canvas>
  <div class="controls">
    <button id="restartBtn">&#37325;&#24320;</button>
    <span style="color:#aaa;font-size:12px;">&#36895;&#24230;:</span>
    <button class="spd" data-v="200">&#26497;&#24930;</button>
    <button class="spd active" data-v="100">&#24930;</button>
    <button class="spd" data-v="40">&#20013;</button>
    <button class="spd" data-v="10">&#24555;</button>
    <button class="spd" data-v="3">&#26497;&#24555;</button>
  </div>
  <div class="info">
    <div>&#24471;&#20998;: <span id="sc">0</span></div>
    <div>&#27493;&#25968;: <span id="st">0</span></div>
    <div>&#34507;&#38271;: <span id="ln">3</span></div>
    <div>AI: <span id="ai">-</span></div>
    <div>&#31354;&#38388;: <span id="sp">-</span></div>
  </div>
  <div class="status" id="msg"></div>
</div>
<script>
// ==============================================================
// AI Snake - Look-Ahead Sniping with Endgame Matrix Folder
// 
// 终极通关补丁：
// 完美解决 395+ 极后期 Food 与 Vacant 空间对角分家导致的拓扑学死锁。
// 376步后启动 🧱 MATRIX 模式，强行用最长路径规整折叠身体，将空位合并，直达 400 满分！
// ==============================================================
var C = document.getElementById('gc'), ctx = C.getContext('2d');
var COLS = 20, ROWS = 20, SZ = 25, TOTAL = COLS * ROWS;
C.width = COLS * SZ; C.height = ROWS * SZ;
var DIRS = [[0, -1], [0, 1], [-1, 0], [1, 0]];
var snake, food, score, steps, stepsSinceFood, gameOver, running, speed = 100, timer = null;

function ck(x, y) { return y * COLS + x; }
function ow(x, y) { return x < 0 || x >= COLS || y < 0 || y >= ROWS; }

function spawnFood() {
  var occ = new Set(snake.map(function(p) { return ck(p[0], p[1]); }));
  var free = [];
  for (var x = 0; x < COLS; x++) for (var y = 0; y < ROWS; y++) if (!occ.has(ck(x, y))) free.push([x, y]);
  return free.length ? free[Math.floor(Math.random() * free.length)] : null;
}

// 高性能 BFS 寻路
function bfs(sx, sy, ex, ey, bodySet) {
  if (sx === ex && sy === ey) return [[sx, sy]];
  var prev = new Map();
  var q = [[sx, sy]];
  prev.set(ck(sx, sy), null);
  
  while (q.length) {
    var p = q.shift();
    if (p[0] === ex && p[1] === ey) {
      var path = []; var c = ck(p[0], p[1]);
      while (c !== null) { path.unshift([c % COLS, Math.floor(c / COLS)]); c = prev.get(c); }
      return path;
    }
    for (var d = 0; d < 4; d++) {
      var nx = p[0] + DIRS[d][0], ny = p[1] + DIRS[d][1], nk = ck(nx, ny);
      if (ow(nx, ny) || bodySet.has(nk) || prev.has(nk)) continue;
      prev.set(nk, ck(p[0], p[1]));
      q.push([nx, ny]);
    }
  }
  return null;
}

// 终局空间连通性计算器
function countFreeSpace(sx, sy, bodySet) {
  var q = [[sx, sy]];
  var visited = new Set();
  var count = 0;
  while (q.length) {
    var p = q.shift();
    for (var d = 0; d < 4; d++) {
      var nx = p[0] + DIRS[d][0], ny = p[1] + DIRS[d][1], nk = ck(nx, ny);
      if (ow(nx, ny) || bodySet.has(nk) || visited.has(nk)) continue;
      visited.add(nk);
      count++;
      q.push([nx, ny]);
    }
  }
  return count;
}

// ─── 极终完备版决策大脑 ─────────────────────────────────────────
function decide() {
  var head = snake[0];
  var fullBodySet = new Set(snake.map(function(p) { return ck(p[0], p[1]); }));
  
  var aiEl = document.getElementById('ai');
  var spEl = document.getElementById('sp');

  // 【第一阶段：精准狙杀（带连通性特赦）】
  var pathToFood = bfs(head[0], head[1], food[0], food[1], fullBodySet);
  if (pathToFood && pathToFood.length > 1) {
    var vSnake = snake.map(function(p) { return [p[0], p[1]]; });
    for (var i = 1; i < pathToFood.length; i++) {
      vSnake.unshift(pathToFood[i]);
      if (pathToFood[i][0] === food[0] && pathToFood[i][1] === food[1]) {} else { vSnake.pop(); }
    }
    
    var vHead = vSnake[0];
    var vTail = vSnake[vSnake.length - 1];
    var vBody = new Set(vSnake.slice(1, -1).map(function(p) { return ck(p[0], p[1]); }));
    
    var fullVBody = new Set(vSnake.slice(1).map(function(p) { return ck(p[0], p[1]); }));
    var totalVirtualFree = TOTAL - vSnake.length;
    var reachableFree = countFreeSpace(vHead[0], vHead[1], fullVBody);
    
    // 双重安全判定：要么能丝滑摸到尾巴，要么进入终局期（剩16格内）且残余空格100%连通无死角
    var isSafe = bfs(vHead[0], vHead[1], vTail[0], vTail[1], vBody) || 
                 (snake.length >= TOTAL - 16 && reachableFree === totalVirtualFree);
    
    if (isSafe) {
      if(aiEl) aiEl.textContent = snake.length >= TOTAL - 16 ? '👑 WIN_PUSH' : '⚡ SNIPE';
      if(spEl) spEl.textContent = 'Direct';
      return [pathToFood[1][0] - head[0], pathToFood[1][1] - head[1]];
    }
  }

  // 【第二阶段：控尾防御与终局规整折叠】
  var bestDir = null;
  var minFoodDist = Infinity;
  var maxTailLen = -1;
  
  var spiralMode = (stepsSinceFood > TOTAL); 
  var isEndgame = (snake.length >= TOTAL - 24); // 终局高危观测期（剩余24格）
  
  var nextTail = snake[snake.length - 2]; 
  var nextObs = new Set(snake.slice(0, -2).map(function(p) { return ck(p[0], p[1]); }));

  for (var d = 0; d < 4; d++) {
    var nx = head[0] + DIRS[d][0], ny = head[1] + DIRS[d][1];
    if (ow(nx, ny) || nextObs.has(ck(nx, ny))) continue;
    if (nx === food[0] && ny === food[1]) continue; // 防御态严禁吞毒饵
    
    var pTail = bfs(nx, ny, nextTail[0], nextTail[1], nextObs);
    if (pTail) {
      var dFood = Math.abs(nx - food[0]) + Math.abs(ny - food[1]);
      
      if (spiralMode || isEndgame) {
        // 【终局核心】：放弃贴近食物，改用最大化路径。
        // 逼迫身体像贪吃蛇标准哈密顿路径一样完美折叠，杜绝对角线死锁，保持真空泡泡完整性。
        if (pTail.length > maxTailLen) {
          maxTailLen = pTail.length; minFoodDist = dFood; bestDir = DIRS[d];
        } else if (pTail.length === maxTailLen) {
          if (dFood < minFoodDist) { minFoodDist = dFood; bestDir = DIRS[d]; }
        }
      } else {
        // 【中前期】：向心压缩，高效追食
        if (dFood < minFoodDist) {
          minFoodDist = dFood; maxTailLen = pTail.length; bestDir = DIRS[d];
        } else if (dFood === minFoodDist) {
          if (pTail.length > maxTailLen) { maxTailLen = pTail.length; bestDir = DIRS[d]; }
        }
      }
    }
  }

  if (bestDir) {
    if(aiEl) aiEl.textContent = spiralMode ? '🌀 BREAK' : (isEndgame ? '🧱 MATRIX' : '🔄 STALL');
    if(spEl) spEl.textContent = spiralMode ? 'Unwinding' : (isEndgame ? 'Perfect Fold' : 'Compressing');
    return bestDir;
  }

  // 【第三阶段：绝命挣扎】
  if(aiEl) aiEl.textContent = '💥 EMER';
  for (var d = 0; d < 4; d++) {
    var nx = head[0] + DIRS[d][0], ny = head[1] + DIRS[d][1];
    if (!ow(nx, ny) && !fullBodySet.has(ck(nx, ny))) return DIRS[d];
  }
  return null;
}

// ─── 驱动与渲染模块 ──────────────────────────────────────────
function gameStep() {
  if (!running || gameOver) return;
  var d = decide();
  if (!d) { gameOver = true; running = false; if(document.getElementById('ai')) document.getElementById('ai').textContent = 'Dead'; draw(); return; }
  
  var head = snake[0], nx = head[0] + d[0], ny = head[1] + d[1];
  var ate = (nx === food[0] && ny === food[1]);
  snake.unshift([nx, ny]);
  
  if (ate) {
    score++; if(document.getElementById('sc')) document.getElementById('sc').textContent = score;
    stepsSinceFood = 0; food = spawnFood();
    if (!food) { gameOver = true; running = false; if(document.getElementById('ai')) document.getElementById('ai').textContent = 'WIN!'; draw(); return; }
  } else {
    snake.pop();
    stepsSinceFood++;
  }
  steps++;
  if(document.getElementById('st')) document.getElementById('st').textContent = steps;
  if(document.getElementById('ln')) document.getElementById('ln').textContent = snake.length;
  draw();
}

function draw() {
  ctx.clearRect(0, 0, C.width, C.height);
  ctx.strokeStyle = '#1a2a4a'; ctx.lineWidth = 0.5;
  for (var x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x * SZ, 0); ctx.lineTo(x * SZ, C.height); ctx.stroke(); }
  for (var y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * SZ); ctx.lineTo(C.width, y * SZ); ctx.stroke(); }
  if (food) {
    ctx.fillStyle = '#e94560'; ctx.shadowColor = '#e94560'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(food[0] * SZ + SZ / 2, food[1] * SZ + SZ / 2, SZ / 2 - 3, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  for (var i = 0; i < snake.length; i++) {
    var sx = snake[i][0], sy = snake[i][1], t = i / snake.length;
    ctx.fillStyle = 'rgb(' + ((46 + t * 80) | 0) + ',' + ((204 - t * 70) | 0) + ',' + ((113 - t * 40) | 0) + ')';
    var pad = 1, cr = 4, lx = sx * SZ + pad, ly = sy * SZ + pad, sw = SZ - pad * 2, sh = SZ - pad * 2;
    ctx.beginPath();
    ctx.moveTo(lx + cr, ly); ctx.lineTo(lx + sw - cr, ly);
    ctx.quadraticCurveTo(lx + sw, ly, lx + sw, ly + cr); ctx.lineTo(lx + sw, ly + sh - cr);
    ctx.quadraticCurveTo(lx + sw, ly + sh, lx + sw - cr, ly + sh); ctx.lineTo(lx + cr, ly + sh);
    ctx.quadraticCurveTo(lx, ly + sh, lx, ly + sh - cr); ctx.lineTo(lx, ly + cr);
    ctx.quadraticCurveTo(lx, ly, lx + cr, ly); ctx.closePath(); ctx.fill();
    if (i === 0) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx * SZ + SZ / 2 - 4, sy * SZ + SZ / 2 - 4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx * SZ + SZ / 2 + 4, sy * SZ + SZ / 2 - 4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(sx * SZ + SZ / 2 - 4, sy * SZ + SZ / 2 - 4, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx * SZ + SZ / 2 + 4, sy * SZ + SZ / 2 - 4, 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, C.width, C.height);
    ctx.fillStyle = '#e94560'; ctx.font = 'bold 32px "Segoe UI",sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(snake.length === TOTAL ? 'PERFECT CLEAR!' : 'GAME OVER', C.width / 2, C.height / 2 - 10);
  }
}

function loop() {
  if (timer) clearInterval(timer);
  if (!running && !gameOver) running = true;
  if (running && !gameOver) timer = setInterval(function() { gameStep(); if (gameOver && timer) { clearInterval(timer); timer = null; } }, speed);
}

function init() {
  var cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
  snake = [[cx, cy], [cx - 1, cy], [cx - 2, cy]];
  score = 0; steps = 0; stepsSinceFood = 0; gameOver = false; running = true;
  if(document.getElementById('sc')) document.getElementById('sc').textContent = '0';
  if(document.getElementById('st')) document.getElementById('st').textContent = '0';
  if(document.getElementById('ln')) document.getElementById('ln').textContent = '3';
  if(document.getElementById('ai')) document.getElementById('ai').textContent = '-';
  if(document.getElementById('sp')) document.getElementById('sp').textContent = '-';
  food = spawnFood(); draw();
}

document.querySelectorAll('.spd').forEach(function(b) {
  b.addEventListener('click', function() {
    document.querySelectorAll('.spd').forEach(function(x) { x.classList.remove('active'); });
    b.classList.add('active'); speed = parseInt(b.dataset.v);
    if (running && !gameOver) loop();
  });
});
document.getElementById('restartBtn').addEventListener('click', function() {
  if (timer) { clearInterval(timer); timer = null; } init(); loop();
});
init(); loop();
</script>
</body>
</html>
