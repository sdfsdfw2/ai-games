<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Physics Orbital Pong</title>
    <style>
        :root {
            --bg-color: #090d16;
            --panel-bg: #111827;
            --accent-blue: #06b6d4;
            --accent-red: #f43f5e;
            --text-main: #f1f5f9;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            font-size: 24px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .scoreboard {
            display: flex;
            align-items: center;
            gap: 40px;
            background: var(--panel-bg);
            padding: 10px 30px;
            border-radius: 14px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #1f2937;
        }
        .score-team {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .team-name { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .blue-t { color: var(--accent-blue); }
        .red-t { color: var(--accent-red); }
        .score-val { font-size: 32px; font-weight: 900; font-family: monospace; }
        .vs { font-size: 14px; color: #4b5563; font-weight: bold; }
        
        .canvas-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #1f2937;
        }
        canvas { display: block; background: #05070f; }
        
        .controls { margin-top: 15px; display: flex; gap: 10px; align-items: center; }
        button {
            background: var(--panel-bg); color: var(--text-main); border: 1px solid #1f2937;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        button:hover { background: #1f2937; border-color: #374151; }
        button.active {
            background: #2563eb; color: #fff; border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(37,99,235,0.5);
        }
        .speed-label { font-size: 13px; color: #4b5563; }
    </style>
</head>
<body>

    <h1>🔮 CHAOTIC ARC-REFRACTION PONG 🔮</h1>
    
    <div class="scoreboard">
        <div class="score-team">
            <div class="team-name blue-t">Cyber Blue AI</div>
            <div class="score-val" id="score-left">0</div>
        </div>
        <div class="vs">GOALS</div>
        <div class="score-team">
            <div class="team-name red-t">Mecha Red AI</div>
            <div class="score-val" id="score-right">0</div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="pongCanvas"></canvas>
    </div>

    <div class="controls">
        <span class="speed-label">时空流速:</span>
        <button class="spd-btn" data-speed="1">1x 线性时间</button>
        <button class="spd-btn active" data-speed="2">2x 标准演进</button>
        <button class="spd-btn" data-speed="5">5x 粒子加速</button>
        <button class="spd-btn" data-speed="15">15x 维度坍缩</button>
    </div>

<script>
const canvas = document.getElementById('pongCanvas');
const ctx = canvas.getContext('2d');

const W = 850;
const H = 500;
canvas.width = W;
canvas.height = H;

// 游戏物理物理常数
const P_RADIUS = 40;       // 圆形挡板半径
const BALL_RADIUS = 8;     // 弹球半径
const INITIAL_SPEED = 6;   // 初始总速度
const SPEED_ACCEL = 0.4;   // 每次撞击后的速度增量

// 球门物理空间 (中间开洞)
const GOAL_TOP = 140;
const GOAL_BOTTOM = 360;

// 核心对象 (新增了 offset 用来让 AI 故意去蹭球的边缘)
let paddleLeft = { x: 80, y: H/2, targetY: H/2, offset: 0, score: 0, color: '#06b6d4', maxSpeed: 10 };
let paddleRight = { x: W - 80, y: H/2, targetY: H/2, offset: 0, score: 0, color: '#f43f5e', maxSpeed: 10 };
let ball = { x: W/2, y: H/2, vx: 0, vy: 0, speed: INITIAL_SPEED };

let simMultiplier = 2;

// ─── 极致轨迹推演核心（预测小球穿过拦截线时的精准Y） ─────────────
function predictLandingY(bX, bY, bVx, bVy, targetX) {
    if ((targetX < bX && bVx > 0) || (targetX > bX && bVx < 0)) return H / 2;
    if ((targetX < bX && bX < W/2) || (targetX > bX && bX > W/2)) return H / 2;

    let x = bX, y = bY, vx = bVx, vy = bVy;
    let r = BALL_RADIUS;
    let safety = 0;

    while (safety < 40) {
        let tX = (targetX - x) / vx;
        let tY = (vy > 0) ? (H - r - y) / vy : (r - y) / vy;

        if (tX >= 0 && tX <= tY) {
            return Math.max(r, Math.min(H - r, y + vy * tX));
        } else {
            x += vx * tY;
            y += vy * tY;
            vy = -vy;
        }
        safety++;
    }
    return H / 2;
}

function resetBall(direction) {
    ball.x = W / 2;
    ball.y = Math.random() * (GOAL_BOTTOM - GOAL_TOP) + GOAL_TOP;
    ball.speed = INITIAL_SPEED;
    
    // 带有一定Y轴斜率的初始随机出球
    let angle = (Math.random() * 60 - 30) * Math.PI / 180;
    ball.vx = direction * ball.speed * Math.cos(angle);
    ball.vy = ball.speed * Math.sin(angle);

    // 重新随机双AI的擦边期望
    paddleLeft.offset = (Math.random() * 2 - 1) * (P_RADIUS * 0.75);
    paddleRight.offset = (Math.random() * 2 - 1) * (P_RADIUS * 0.75);

    updateAI();
}

function updateAI() {
    paddleLeft.maxSpeed = Math.max(10, Math.abs(ball.vx) * 1.2);
    paddleRight.maxSpeed = Math.max(10, Math.abs(ball.vx) * 1.2);

    // AI 不再瞄准球心，而是瞄准 【落点 Y + 偏移量】，故意实现边缘擦边碰撞
    paddleLeft.targetY = predictLandingY(ball.x, ball.y, ball.vx, ball.vy, paddleLeft.x) + paddleLeft.offset;
    paddleRight.targetY = predictLandingY(ball.x, ball.y, ball.vx, ball.vy, paddleRight.x) + paddleRight.offset;
}

function movePaddle(paddle) {
    let diff = paddle.targetY - paddle.y;
    if (Math.abs(diff) > 1) {
        paddle.y += (diff > 0) ? Math.min(diff, paddle.maxSpeed) : Math.max(diff, -paddle.maxSpeed);
    }
    paddle.y = Math.max(P_RADIUS, Math.min(H - P_RADIUS, paddle.y));
}

function updateFrame() {
    ball.x += ball.vx;
    ball.y += ball.vy;

    // 1. 上下天花板/地板反弹
    if (ball.y - BALL_RADIUS <= 0) {
        ball.y = BALL_RADIUS; ball.vy = -ball.vy; updateAI();
    } else if (ball.y + BALL_RADIUS >= H) {
        ball.y = H - BALL_RADIUS; ball.vy = -ball.vy; updateAI();
    }

    // 2. 左右两侧后实体墙与中间球门判定
    if (ball.x - BALL_RADIUS <= 0) {
        if (ball.y >= GOAL_TOP && ball.y <= GOAL_BOTTOM) {
            paddleRight.score++;
            document.getElementById('score-right').textContent = paddleRight.score;
            resetBall(1); return;
        } else {
            ball.x = BALL_RADIUS; ball.vx = -ball.vx; updateAI(); // 后墙刚性反弹
        }
    }
    if (ball.x + BALL_RADIUS >= W) {
        if (ball.y >= GOAL_TOP && ball.y <= GOAL_BOTTOM) {
            paddleLeft.score++;
            document.getElementById('score-left').textContent = paddleLeft.score;
            resetBall(-1); return;
        } else {
            ball.x = W - BALL_RADIUS; ball.vx = -ball.vx; updateAI();
        }
    }

    // 3. 核心物理：圆盘侧边缘向量碰撞判定
    checkCircleCollision(paddleLeft);
    checkCircleCollision(paddleRight);

    movePaddle(paddleLeft);
    movePaddle(paddleRight);
}

// ─── 真正的二维圆周曲面弹射引擎 ───────────────────────────────
function checkCircleCollision(paddle) {
    let dx = ball.x - paddle.x;
    let dy = ball.y - paddle.y;
    let distance = Math.sqrt(dx * dx + dy * dy);
    let minDist = P_RADIUS + BALL_RADIUS;

    if (distance < minDist) {
        // 算出精确的碰撞切面法向量 (nx, ny)
        let nx = dx / distance;
        let ny = dy / distance;

        // 速度在法向量上的投影量
        let dot = ball.vx * nx + ball.vy * ny;

        // 只有球向内挤压时才计算反弹，避免卡球
        if (dot < 0) {
            // 完美的 2D 向量全向弹开公式：V_reflected = V - 2 * (V · N) * N
            ball.vx = ball.vx - 2 * dot * nx;
            ball.vy = ball.vy - 2 * dot * ny;

            // 速度进化叠加
            ball.speed += SPEED_ACCEL;
            
            // 重新规格化向量，赋予小球由于弧度碰撞产生的全新方向矢量
            let currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            ball.vx = (ball.vx / currentSpeed) * ball.speed;
            ball.vy = (ball.vy / currentSpeed) * ball.speed;

            // 强行抽离重叠层，防止因为速度过高嵌入圆盘
            let overlap = minDist - distance;
            ball.x += nx * overlap;
            ball.y += ny * overlap;

            // 碰撞发生后，AI 随机改变下一次的擦边位置（Offset），从而源源不断地创造新角度！
            paddleLeft.offset = (Math.random() * 2 - 1) * (P_RADIUS * 0.8);
            paddleRight.offset = (Math.random() * 2 - 1) * (P_RADIUS * 0.8);

            updateAI();
        }
    }
}

// ─── 画面高科技渲染层 ─────────────────────────────────────────────
function draw() {
    ctx.clearRect(0, 0, W, H);

    // 1. 背景线
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
    ctx.beginPath(); ctx.arc(W/2, H/2, 60, 0, Math.PI*2); ctx.stroke();

    // 2. 绘制实体墙面与彩色霓虹球门
    ctx.lineWidth = 6;
    ctx.strokeStyle = '#1f2937';
    // 左墙
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, GOAL_TOP); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, GOAL_BOTTOM); ctx.lineTo(0, H); ctx.stroke();
    // 左球门虚线泛光
    ctx.strokeStyle = 'rgba(6, 182, 212, 0.5)';
    ctx.beginPath(); ctx.moveTo(0, GOAL_TOP); ctx.lineTo(0, GOAL_BOTTOM); ctx.stroke();

    // 右墙
    ctx.strokeStyle = '#1f2937';
    ctx.beginPath(); ctx.moveTo(W, 0); ctx.lineTo(W, GOAL_TOP); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W, GOAL_BOTTOM); ctx.lineTo(W, H); ctx.stroke();
    // 右球门虚线泛光
    ctx.strokeStyle = 'rgba(244, 63, 94, 0.5)';
    ctx.beginPath(); ctx.moveTo(W, GOAL_TOP); ctx.lineTo(W, GOAL_BOTTOM); ctx.stroke();

    // 3. 渲染圆形波动挡板
    drawPaddle(paddleLeft);
    drawPaddle(paddleRight);

    // 4. 渲染量子核心小球
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
}

function drawPaddle(p) {
    let gradient = ctx.createRadialGradient(p.x, p.y, P_RADIUS * 0.1, p.x, p.y, P_RADIUS);
    gradient.addColorStop(0, '#ffffff');
    gradient.addColorStop(0.2, p.color);
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(p.x, p.y, P_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // 核心硬质光环
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, P_RADIUS * 0.6, 0, Math.PI * 2);
    ctx.stroke();
}

// ─── 时空循环控制器 ──────────────────────────────────────────────
function gameLoop() {
    for (let i = 0; i < simMultiplier; i++) {
        updateFrame();
    }
    draw();
    requestAnimationFrame(gameLoop);
}

document.querySelectorAll('.spd-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.spd-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        simMultiplier = parseInt(btn.dataset.speed);
    });
});

resetBall(Math.random() > 0.5 ? 1 : -1);
gameLoop();
</script>

</body>
</html>
